<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Callout Calibration Tool</title>
<link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
<link rel="icon" type="image/png" href="img/logo-big.png"/>
<script src="theme.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }
  #sidebar { width: 340px; padding: 16px; overflow-y: auto; background: #0f1930; border-right: 1px solid #1e3a5f; display: flex; flex-direction: column; gap: 12px; }
  #sidebar h2 { font-size: 14px; color: #fbbf24; }
  #map-select { background: #1a2744; color: #e0e0e0; border: 1px solid #2a3f5f; padding: 6px 10px; border-radius: 6px; font-size: 13px; width: 100%; }
  .callout-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.15s; }
  .callout-item:hover { background: #1a2744; }
  .callout-item.active { background: #1e3a5f; border: 1px solid #fbbf24; }
  .callout-item.done { opacity: 0.5; }
  .callout-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .callout-item .dot.pending { background: #4a5568; }
  .callout-item .dot.placed { background: #22c55e; }
  .callout-item .coords { margin-left: auto; font-family: monospace; font-size: 10px; color: #94a3b8; }
  #current-callout { font-size: 18px; color: #fbbf24; font-weight: bold; text-align: center; padding: 10px; background: #1a2744; border-radius: 8px; }
  #instructions { font-size: 11px; color: #94a3b8; line-height: 1.5; }
  #output-section { margin-top: auto; }
  #output-btn { background: #22c55e; color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 13px; }
  #output-btn:hover { background: #16a34a; }
  #reset-btn { background: #ef4444; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; width: 100%; margin-top: 6px; }
  #output-area { background: #0a1628; border: 1px solid #2a3f5f; color: #22c55e; font-family: monospace; font-size: 10px; padding: 8px; border-radius: 6px; width: 100%; height: 120px; margin-top: 8px; resize: vertical; }
  #map-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; position: relative; }
  #radar-container { position: relative; width: 100%; max-width: 1024px; aspect-ratio: 1/1; }
  #radar-img { width: 100%; height: 100%; object-fit: contain; display: block; image-rendering: auto; }
  #radar-canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; }
  .progress { font-size: 11px; color: #94a3b8; text-align: center; }
  #undo-btn { background: #6366f1; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; width: 100%; margin-top: 6px; }
  #theme-toggle-cal { background: none; border: 1px solid #2a3f5f; color: #94a3b8; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; margin-top: 4px; }
  #theme-toggle-cal:hover { border-color: #fbbf24; color: #fbbf24; }

  /* Light mode overrides — Pastel Tactical Editorial */
  [data-theme="light"] body { background: #f7fafc; color: #2b3437; }
  [data-theme="light"] #sidebar { background: #eff4f7; border-right-color: rgba(170,179,183,0.18); }
  [data-theme="light"] #sidebar h2 { color: #6d4ea3; }
  [data-theme="light"] #map-select { background: #ffffff; color: #2b3437; border-color: rgba(170,179,183,0.18); }
  [data-theme="light"] .callout-item:hover { background: #e8edf0; }
  [data-theme="light"] .callout-item.active { background: #dde3e7; border-color: #6d4ea3; }
  [data-theme="light"] .callout-item .coords { color: #5a6365; }
  [data-theme="light"] .callout-item .dot.pending { background: #aab3b7; }
  [data-theme="light"] .callout-item .dot.placed { background: #00796b; }
  [data-theme="light"] #current-callout { color: #6d4ea3; background: #ffffff; }
  [data-theme="light"] #instructions { color: #5a6365; }
  [data-theme="light"] #output-section #output-btn { background: #00796b; color: #ffffff; }
  [data-theme="light"] #output-section #output-btn:hover { background: #00695c; }
  [data-theme="light"] #output-section #reset-btn { background: #ba1a1a; }
  [data-theme="light"] #output-section #undo-btn { background: #6d4ea3; }
  [data-theme="light"] #output-area { background: #ffffff; border-color: rgba(170,179,183,0.18); color: #00796b; }
  [data-theme="light"] #map-area { background: #f0f3f5; }
  [data-theme="light"] .progress { color: #5a6365; }
  [data-theme="light"] #theme-toggle-cal { border-color: rgba(170,179,183,0.18); color: #5a6365; }
  [data-theme="light"] #theme-toggle-cal:hover { border-color: #6d4ea3; color: #6d4ea3; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Callout Calibration</h2>
  <div id="instructions">
    1. Select a map<br>
    2. Click on each callout name in the list<br>
    3. Click on the radar image where that callout should be<br>
    4. Export the JSON when done
  </div>

  <select id="map-select" onchange="loadMap()">
    <option value="">-- Select Map --</option>
    <option value="de_mirage">Mirage</option>
    <option value="de_inferno">Inferno</option>
    <option value="de_dust2">Dust 2</option>
    <option value="de_anubis">Anubis</option>
    <option value="de_nuke">Nuke</option>
    <option value="de_ancient">Ancient</option>
    <option value="de_overpass">Overpass</option>
    <option value="de_vertigo">Vertigo</option>
    <option value="de_train">Train</option>
  </select>

  <div id="current-callout">Select a callout</div>
  <div class="progress" id="progress">0 / 0 placed</div>

  <div id="callout-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;"></div>

  <div id="output-section">
    <button id="undo-btn" onclick="undoLast()">Undo Last</button>
    <button id="reset-btn" onclick="resetAll()">Reset All</button>
    <button id="output-btn" onclick="exportJSON()">Export JSON</button>
    <textarea id="output-area" readonly placeholder="JSON output will appear here..."></textarea>
    <button id="theme-toggle-cal" onclick="toggleTheme()">Toggle Theme</button>
  </div>
</div>

<div id="map-area">
  <div id="radar-container">
    <img id="radar-img" src="" alt="Radar">
    <canvas id="radar-canvas" width="1024" height="1024"></canvas>
  </div>
</div>

<script>
const API = window.location.origin;
const CALLOUTS = {
  de_mirage: [
    "B Site","Bench","B Van","Market","Market Door","Kitchen",
    "B Apartments","B Short",
    "A Site","A Default","Firebox","Tetris","Stairs","A Ramp",
    "Jungle","Ticket",
    "CT Spawn","Snipers Nest",
    "Connector","Chair",
    "Top Mid","Mid Window","Window","Catwalk","Short","Mid",
    "Underpass","Ladder Room",
    "T Spawn","T Ramp","A Palace","A Main","B Apartments Entrance",
    "A Side","B Side","Mid Area","T Area"
  ],
  de_inferno: [
    "A Site","Pit","Balcony","Library","Arch","Graveyard","Truck",
    "Mid","Alt Mid","Underpass","Top Mid",
    "B Site","Banana","Oranges","Car","Dark","CT","Construction","New Box","Coffins",
    "T Spawn","T Apartments","Apartments","Second Mid","Boiler",
    "A Side","B Side","T Area","T Approach"
  ],
  de_dust2: [
    "A Site","A Short (Cat)","A Long","A Long Doors","A Pit","A Car",
    "Goose","A Ramp","CT Spawn",
    "Mid Doors","Mid","Catwalk","Lower Tunnels","Upper Tunnels","Xbox",
    "B Site","B Tunnels","B Doors","B Window","B Back Site","B Car",
    "T Spawn","T Mid","Outside Long",
    "A Side","B Side","Mid Area"
  ],
  de_anubis: [
    "A Site","A Main","A Bridge","A Connector",
    "Mid","Top Mid",
    "B Site","B Main","B Pillar","B Connector",
    "CT Spawn","T Spawn",
    "A Side","B Side"
  ],
  de_nuke: [
    "A Site","Hut","Heaven","Hell","Squeaky","Main","Lobby",
    "Ramp","Outside","Secret","B Site","T Spawn","CT Spawn"
  ],
  de_ancient: [
    "A Site","A Main","A Short","Cave","Donut",
    "Mid","Top Mid",
    "B Site","B Main","B Ramp","B Pillar",
    "CT Spawn","T Spawn"
  ],
  de_overpass: [
    "A Site","A Long","A Short","Truck","Bathrooms",
    "B Site","B Short","Monster","Fountain","Connector",
    "CT Spawn","T Spawn"
  ],
  de_vertigo: [
    "A Site","A Ramp","A Short",
    "B Site","B Stairs","B Ramp",
    "Mid","CT Spawn","T Spawn"
  ],
  de_train: [
    "A Site","Ivy","Connector","Pop Dog",
    "B Site","B Upper","B Lower",
    "Mid","CT Spawn","T Spawn"
  ]
};

let currentMap = '';
let currentCallout = null;
let placements = {};  // { calloutName: {px, py} }
let placementOrder = [];  // for undo

function loadMap() {
  const sel = document.getElementById('map-select');
  currentMap = sel.value;
  if (!currentMap) return;

  // Load radar image
  const img = document.getElementById('radar-img');
  const shortName = currentMap.replace('de_','').replace('cs_','');
  img.src = `/frontend/img/radar/${shortName}.png`;

  // Reset
  placements = {};
  placementOrder = [];
  currentCallout = null;
  document.getElementById('current-callout').textContent = 'Click a callout below';

  // Build callout list
  const list = document.getElementById('callout-list');
  list.innerHTML = '';
  const callouts = CALLOUTS[currentMap] || [];
  for (const c of callouts) {
    const div = document.createElement('div');
    div.className = 'callout-item';
    div.innerHTML = `<span class="dot pending" id="dot-${c}"></span><span>${c}</span><span class="coords" id="coords-${c}"></span>`;
    div.onclick = () => selectCallout(c, div);
    list.appendChild(div);
  }
  updateProgress();
  redrawCanvas();
}

function selectCallout(name, el) {
  document.querySelectorAll('.callout-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  currentCallout = name;
  document.getElementById('current-callout').textContent = name;
}

function updateProgress() {
  const total = (CALLOUTS[currentMap] || []).length;
  const done = Object.keys(placements).length;
  document.getElementById('progress').textContent = `${done} / ${total} placed`;
}

// Canvas click — place callout
document.getElementById('radar-canvas').addEventListener('click', function(e) {
  if (!currentCallout || !currentMap) return;

  const rect = this.getBoundingClientRect();
  const px = Math.round((e.clientX - rect.left) * (1024 / rect.width));
  const py = Math.round((e.clientY - rect.top) * (1024 / rect.height));

  placements[currentCallout] = { px, py };
  placementOrder.push(currentCallout);

  // Update UI
  const dot = document.getElementById('dot-' + currentCallout);
  if (dot) { dot.classList.remove('pending'); dot.classList.add('placed'); }
  const coords = document.getElementById('coords-' + currentCallout);
  if (coords) coords.textContent = `(${px}, ${py})`;

  // Auto-advance to next unplaced callout
  const callouts = CALLOUTS[currentMap] || [];
  const currentIdx = callouts.indexOf(currentCallout);
  let nextIdx = -1;
  for (let i = currentIdx + 1; i < callouts.length; i++) {
    if (!placements[callouts[i]]) { nextIdx = i; break; }
  }
  if (nextIdx === -1) {
    for (let i = 0; i < currentIdx; i++) {
      if (!placements[callouts[i]]) { nextIdx = i; break; }
    }
  }

  if (nextIdx >= 0) {
    const items = document.querySelectorAll('.callout-item');
    selectCallout(callouts[nextIdx], items[nextIdx]);
    items[nextIdx].scrollIntoView({ block: 'nearest' });
  } else {
    document.getElementById('current-callout').textContent = 'All placed!';
    currentCallout = null;
  }

  updateProgress();
  redrawCanvas();
});

// Mouse move: show crosshair coordinates
document.getElementById('radar-canvas').addEventListener('mousemove', function(e) {
  const rect = this.getBoundingClientRect();
  const px = Math.round((e.clientX - rect.left) * (1024 / rect.width));
  const py = Math.round((e.clientY - rect.top) * (1024 / rect.height));
  this.title = `(${px}, ${py})`;
});

function redrawCanvas() {
  const canvas = document.getElementById('radar-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 1024, 1024);
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const accent = isLight ? '#6d4ea3' : '#fbbf24';
  const labelBg = isLight ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.7)';

  for (const [name, pos] of Object.entries(placements)) {
    // Crosshair
    ctx.strokeStyle = isLight ? 'rgba(109,78,163,0.6)' : 'rgba(251,191,36,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pos.px - 12, pos.py); ctx.lineTo(pos.px + 12, pos.py);
    ctx.moveTo(pos.px, pos.py - 12); ctx.lineTo(pos.px, pos.py + 12);
    ctx.stroke();

    // Circle
    ctx.strokeStyle = isLight ? 'rgba(109,78,163,0.8)' : 'rgba(251,191,36,0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(pos.px, pos.py, 8, 0, Math.PI * 2);
    ctx.stroke();

    // Label
    ctx.font = 'bold 10px sans-serif';
    const w = ctx.measureText(name).width;
    ctx.fillStyle = labelBg;
    ctx.fillRect(pos.px - w/2 - 3, pos.py - 22, w + 6, 14);
    ctx.fillStyle = accent;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, pos.px, pos.py - 15);
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  }
}

function undoLast() {
  if (placementOrder.length === 0) return;
  const last = placementOrder.pop();
  delete placements[last];
  const dot = document.getElementById('dot-' + last);
  if (dot) { dot.classList.remove('placed'); dot.classList.add('pending'); }
  const coords = document.getElementById('coords-' + last);
  if (coords) coords.textContent = '';
  updateProgress();
  redrawCanvas();
}

function resetAll() {
  if (!confirm('Reset all placements?')) return;
  placements = {};
  placementOrder = [];
  document.querySelectorAll('.dot').forEach(d => { d.classList.remove('placed'); d.classList.add('pending'); });
  document.querySelectorAll('.coords').forEach(c => c.textContent = '');
  currentCallout = null;
  document.getElementById('current-callout').textContent = 'Click a callout below';
  updateProgress();
  redrawCanvas();
}

function exportJSON() {
  const result = {};
  for (const [name, pos] of Object.entries(placements)) {
    result[name] = [pos.px, pos.py];
  }
  const json = JSON.stringify({ map: currentMap, positions: result }, null, 2);
  document.getElementById('output-area').value = json;

  // Copy to clipboard
  navigator.clipboard.writeText(json).then(() => {
    document.getElementById('output-btn').textContent = 'Copied!';
    setTimeout(() => { document.getElementById('output-btn').textContent = 'Export JSON'; }, 2000);
  });
}
</script>
</body>
</html>
